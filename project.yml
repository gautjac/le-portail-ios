name: LePortail
options:
  bundleIdPrefix: app.atelier.portail
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: fr

# Bilingual FR + EN. fr is the development/fallback language.
knownRegions:
  - fr
  - en
  - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "9WZ66DZ69J"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  # ───────────────────────── App ─────────────────────────
  LePortail:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: Sources
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: Le Portail
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleLocalizations: [fr, en]
        LSApplicationCategoryType: public.app-category.utilities
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: app.atelier.portail.ios
            CFBundleURLSchemes: [portail]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.portail.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/Portail.entitlements
    dependencies:
      - target: PortailWidget
        embed: true

  # ──────────────────── Widget extension ────────────────────
  PortailWidget:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: Widget
      # Shared code compiled into the widget too.
      - path: Sources/Shared
    info:
      path: Widget/Resources/Info.plist
      properties:
        CFBundleDisplayName: Le Portail
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.portail.ios.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: Widget/Resources/Widget.entitlements
        GENERATE_INFOPLIST_FILE: NO

  # ──────────────────────── Tests ────────────────────────
  LePortailTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: LePortail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.portail.ios.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LePortail:
    build:
      targets:
        LePortail: all
        PortailWidget: all
        LePortailTests: [test]
    test:
      targets:
        - LePortailTests
